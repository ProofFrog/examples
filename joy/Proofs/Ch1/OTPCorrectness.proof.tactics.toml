[[entry]]
transform = "XOR Cancellation"
description = "hop 0 left: discharges xor cancellation `xor_lambda k (xor_lambda k m) = m` on the OTP correctness Test return value. The equiv is purely deterministic (no sampling, no module calls), so `proc; auto => />` reduces it to the pointwise xor identity which smt closes with the per-clone xor_lambda involution + commutativity axioms."
added = "2026-06-01"
game_before = '''
proc Test(k : BitString<lambda>, m : BitString<lambda>) : BitString<lambda>? = {
  return (k BinaryOperators.ADD (k BinaryOperators.ADD m));
}
'''
game_after = '''
proc Test(k : BitString<lambda>, m : BitString<lambda>) : BitString<lambda>? = {
  return m;
}
'''
tactic = '''
proc.
auto => />.
smt(xor_lambda_invol xor_lambda_commut).
'''
