[[entry]]
transform = "<oracle>:challenge"
description = "hop 0 challenge -- post-init transformed body; det-axiom finisher (F_evaluate_det) relating the two abstract encaps results. EC-validated to qed (EXIT 0). Keys refreshed 2026-06-12: tuple-destructuring adoption (FrogLang #220 / examples #45) renamed tuple temporaries (k/rsp -> _tup)."
added = "2026-06-06"
game_before = '''
proc Initialize() : PKeySpace = {
  var _tup : [PKeySpace, SKeySpace];
  _tup <@ K.KeyGen();
  pk = _tup[0];
  sk = _tup[1];
  return pk;
}
proc Challenge() : [BitString<out>, CiphertextSpace] = {
  var v_KF_Encaps_x0 : [SharedSecretSpace, CiphertextSpace];
  v_KF_Encaps_x0 <@ K.Encaps(pk);
  var v_KF_Encaps_k0 : BitString<lambda>;
  v_KF_Encaps_k0 = v_KF_Encaps_x0[0];
  var v_KF_Encaps_c0 : CiphertextSpace;
  v_KF_Encaps_c0 = v_KF_Encaps_x0[1];
  var v_KF_Encaps_ss0 : BitString<out>;
  v_KF_Encaps_ss0 <@ F.evaluate(v_KF_Encaps_k0, v_KF_Encaps_c0);
  var _tup : [BitString<out>, CiphertextSpace];
  _tup = (v_KF_Encaps_ss0, v_KF_Encaps_c0);
  var ss : BitString<out>;
  ss = _tup[0];
  var ctxt : CiphertextSpace;
  ctxt = _tup[1];
  return (ss, ctxt);
}
'''
game_after = '''
proc Initialize() : PKeySpace = {
  var challenger_Initialize__tup0 : [PKeySpace, SKeySpace];
  challenger_Initialize__tup0 <@ K.KeyGen();
  challenger_pk = challenger_Initialize__tup0[0];
  challenger_sk = challenger_Initialize__tup0[1];
  return challenger_pk;
}
proc Challenge() : [BitString<out>, CiphertextSpace] = {
  var challenger_Challenge__tup0 : [SharedSecretSpace, CiphertextSpace];
  challenger_Challenge__tup0 <@ K.Encaps(challenger_pk);
  var challenger_Challenge_ss0 : SharedSecretSpace;
  challenger_Challenge_ss0 = challenger_Challenge__tup0[0];
  var challenger_Challenge_ctxt0 : CiphertextSpace;
  challenger_Challenge_ctxt0 = challenger_Challenge__tup0[1];
  var _tup : [SharedSecretSpace, CiphertextSpace];
  _tup = (challenger_Challenge_ss0, challenger_Challenge_ctxt0);
  var ss : SharedSecretSpace;
  ss = _tup[0];
  var ct : CiphertextSpace;
  ct = _tup[1];
  var _r0 : BitString<F.out>;
  _r0 <@ F.evaluate(ss, ct);
  return (_r0, ct);
}
'''
tactic = '''
proc. inline *. sp. wp.
seq 1 1 : (={glob K, glob F} /\ x{1} = _tup0{2} /\ KF_c.KEM_INDCPA_MultiChal_Real.pk{1} = K_c.KEM_INDCPA_MultiChal_Real.pk{2}).
+ sim.
sp. wp.
exists* (glob F){1}, k{1}, c{1}; elim* => gf1 kv cv.
call{1} (F_evaluate_det gf1 kv cv).
exists* (glob F){2}, ss{2}, ct{2}; elim* => gf2 ssv ctv.
call{2} (F_evaluate_det gf2 ssv ctv).
skip => /#.
